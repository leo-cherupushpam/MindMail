<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MailMind - Email Intelligence Platform</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Top bar -->
  <header class="gmail-topbar">
    <span class="hamburger">☰</span>
    <div class="gmail-logo"><span>M</span>MailMind</div>
    <div class="gmail-search">🔍&nbsp;&nbsp;Search email</div>
    <div class="topbar-icons">
      <span title="Help">?</span>
      <span title="Settings">⚙</span>
      <span title="Assistant">✦</span>
      <div class="user-avatar">L</div>
    </div>
  </header>

  <!-- Main layout -->
  <div class="gmail-main">

    <!-- Left nav -->
    <nav class="gmail-nav" id="left-nav"></nav>

    <!-- Content: inbox list OR reading pane -->
    <main class="gmail-content" id="content-area">
      <div style="padding:32px;color:#5F6368;text-align:center;font-size:14px;font-weight:500;">Loading…</div>
    </main>

    <!-- AI panel: hidden until an email is opened -->
    <aside class="gmail-ai-panel" id="ai-panel" style="display:none;"></aside>

  </div>

  <!-- Compose Modal -->
  <div id="compose-modal" class="compose-modal" style="display:none;">
    <div class="compose-backdrop"></div>
    <div class="compose-container">
      <div class="compose-panes">
        <!-- Left Pane: Email Editor -->
        <div class="compose-editor">
          <div class="compose-header">
            <h2>Compose Email</h2>
            <button id="compose-close-btn" class="compose-close-btn" title="Close">✕</button>
          </div>
          <input id="compose-subject" class="compose-subject-input" type="text" placeholder="Subject">
          <textarea id="compose-body" class="compose-body-textarea" placeholder="Body"></textarea>
          <div class="compose-actions">
            <button id="compose-send" class="compose-send-btn">Send</button>
            <button id="compose-cancel" class="compose-cancel-btn">Cancel</button>
          </div>
        </div>
        <!-- Right Pane: AI Panel -->
        <div class="compose-ai-panel" id="compose-ai-panel"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
